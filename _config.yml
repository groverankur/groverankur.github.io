# About Section
about_title: About Me
about_profile_image: images/profile.jpg
about_content: | # this will include new lines to allow paragraphs
  Hi, I am a <mark>Data Engineering leader</mark> with 18+ years of experience designing and operating large-scale distributed data platforms across telecom and enterprise environments.

  At Jio Platforms, I have led data platforms operating at **100PB+ scale across 800+ nodes**, managing **100+ pipelines** and leading a team of **10 engineers**.

  I have driven measurable impact by improving platform SLA from **65% to 87%** through Spark optimization and platform reliability initiatives.

  My expertise lies in **Spark, Hadoop ecosystem, enterprise data architecture, and large-scale data ingestion systems**.

  I am currently focused on evolving toward modern data platforms including:
  - Lakehouse architectures (Delta Lake, Databricks)
  - Real-time streaming systems (Kafka, Spark Structured Streaming)
  - Scalable and governed data platforms

  I stay current with evolving data platform practices and remain committed to continuous learning and professional development.

  I am interested in Technical Leadership roles where I can combine deep distributed systems experience with modern data platform architecture.

  When I'm not working on exciting data projects, you can find me <mark>reading books</mark>. I believe that balance is key to a fulfilling life, both personally and professionally.

